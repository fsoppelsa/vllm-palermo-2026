---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-d-demo

---
# 3 repliche del simulatore vLLM
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-simulator
  namespace: llm-d-demo
  labels:
    app: vllm-sim
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vllm-sim
  template:
    metadata:
      labels:
        app: vllm-sim
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: vllm-sim
          # Se ARM64 non disponibile, usare l'immagine buildata localmente
          # Vedere Troubleshooting in claude.md per build locale
          image: ghcr.io/llm-d/llm-d-inference-sim:dev
          args:
            - "--port=8000"
            - "--model=meta-llama/Llama-3.1-8B-Instruct"
            - "--mode=random"
            - "--inter-token-latency=60ms"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
# Service ClusterIP per comunicazione interna
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-service
  namespace: llm-d-demo
spec:
  type: ClusterIP
  selector:
    app: vllm-sim
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
# NodePort per accesso diretto durante la demo
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-nodeport
  namespace: llm-d-demo
spec:
  type: NodePort
  selector:
    app: vllm-sim
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 31800
      name: http
