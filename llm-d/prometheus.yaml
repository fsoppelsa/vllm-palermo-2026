---
# ServiceAccount + RBAC so Prometheus can discover pods via K8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: llm-d-demo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-llmd
rules:
  - apiGroups: [""]
    resources: [nodes, services, endpoints, pods]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-llmd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-llmd
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: llm-d-demo

---
# Prometheus configuration — scrapes pods annotated with prometheus.io/scrape=true
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: llm-d-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'vllm-sim-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['llm-d-demo']
        relabel_configs:
          # Keep only pods with prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          # Build __address__ from pod IP + annotation port
          - source_labels: [__meta_kubernetes_pod_ip,
                            __meta_kubernetes_pod_annotation_prometheus_io_port]
            separator: ':'
            target_label: __address__
          # Use annotation path if set
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Useful labels for the UI
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: llm-d-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=1h"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
# NodePort — Prometheus UI accessibile su http://<node-ip>:31900
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: llm-d-demo
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 31900
      name: web
